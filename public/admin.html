<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Alerta Condominio</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --rojo:#ff1a1a; --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --text:#f0f0f0; --text-dim:#888; --verde:#00e676; --border:#2a2a2a; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; gap:1rem; justify-content:space-between; }
    .topbar h1 { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; color:var(--rojo); letter-spacing:2px; }
    .container { max-width:900px; margin:0 auto; padding:2rem; display:flex; flex-direction:column; gap:2rem; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.5rem; display:flex; flex-direction:column; gap:1rem; }
    .panel h2 { font-family:'Black Han Sans',sans-serif; font-size:1rem; letter-spacing:2px; display:flex; justify-content:space-between; align-items:center; }
    .tabla-header { display:grid; grid-template-columns:80px 1fr 160px 100px; gap:0.5rem; padding:0.6rem 0.8rem; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
    .vecino-row { display:grid; grid-template-columns:80px 1fr 160px 100px; gap:0.5rem; padding:0.7rem 0.8rem; background:var(--surface2); border-radius:10px; margin-bottom:0.4rem; align-items:center; }
    .vecino-row input { background:transparent; border:none; border-bottom:1px solid #333; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; padding:0.2rem 0.3rem; outline:none; width:100%; }
    .vecino-row input:focus { border-bottom-color:var(--rojo); }
    .btn-del { background:transparent; border:1px solid #333; border-radius:6px; color:var(--text-dim); padding:0.3rem 0.6rem; cursor:pointer; font-size:0.8rem; }
    .btn-del:hover { border-color:var(--rojo); color:var(--rojo); }
    .row-acciones { display:flex; gap:0.8rem; flex-wrap:wrap; }
    .btn { border:none; border-radius:10px; padding:0.7rem 1.2rem; font-size:0.85rem; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:700; }
    .btn-add { background:var(--surface2); color:var(--text); border:1px solid #333; }
    .btn-guardar { background:var(--verde); color:#000; }
    .btn-guardar:disabled { background:#444; color:#888; cursor:not-allowed; }
    .status { padding:0.8rem 1rem; border-radius:10px; font-size:0.85rem; display:none; }
    .status.ok { background:#0a2a0a; border:1px solid #00e676; color:#00e676; display:block; }
    .status.error { background:#2a0a0a; border:1px solid var(--rojo); color:var(--rojo); display:block; }
    .status.loading { background:var(--surface2); border:1px solid #444; color:var(--text-dim); display:block; }
    .pin-box { background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:1rem; display:flex; gap:1rem; align-items:center; }
    .pin-box label { font-size:0.75rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
    .pin-box input { background:transparent; border:1px solid #333; border-radius:8px; color:var(--text); font-size:1rem; padding:0.5rem 0.8rem; outline:none; width:120px; text-align:center; letter-spacing:4px; font-family:monospace; }
    .pin-box input:focus { border-color:var(--rojo); }
    .counter { font-size:0.75rem; color:var(--text-dim); }
    .counter strong { color:var(--text); }
  </style>
</head>
<body>
<div class="topbar">
  <h1>🛡 ADMIN · ALERTA CONDOMINIO</h1>
  <span id="status-conexion" style="font-size:0.75rem;color:var(--text-dim)">Conectando...</span>
</div>

<div class="container">
  <div class="panel">
    <h2>🔐 ACCESO ADMIN</h2>
    <div class="pin-box">
      <label>PIN Admin</label>
      <input type="password" id="admin-pin" placeholder="••••" maxlength="4" inputmode="numeric"/>
      <button class="btn btn-guardar" onclick="cargarVecinos()">Conectar</button>
    </div>
  </div>

  <div class="panel" id="panel-vecinos" style="display:none">
    <h2>
      👥 VECINOS
      <span class="counter">Total: <strong id="contador">0</strong></span>
    </h2>
    <div class="tabla-header">
      <span>Parcela</span><span>Nombre</span><span>Teléfono</span><span>Acción</span>
    </div>
    <div id="lista-vecinos"></div>
    <div class="row-acciones">
      <button class="btn btn-add" onclick="agregarVecino()">+ Agregar vecino</button>
      <button class="btn btn-guardar" id="btn-guardar" onclick="guardarVecinos()">💾 Guardar cambios</button>
    </div>
    <div class="status" id="status-msg"></div>
  </div>
</div>

<script>
  let vecinos = [];
  const API = '';

  async function cargarVecinos() {
    const pin = document.getElementById('admin-pin').value;
    if (!pin || pin.length !== 4) return alert('Ingresa el PIN admin de 4 dígitos');

    mostrarStatus('Conectando...', 'loading');
    try {
      const res = await fetch(`${API}/api/admin-vecinos`, {
        headers: { 'x-admin-pin': pin }
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      vecinos = data.vecinos || [];
      document.getElementById('panel-vecinos').style.display = 'flex';
      document.getElementById('status-conexion').textContent = '✅ Conectado';
      document.getElementById('status-conexion').style.color = '#00e676';
      render();
      mostrarStatus(`${vecinos.length} vecinos cargados correctamente`, 'ok');
    } catch (err) {
      mostrarStatus(`Error: ${err.message}`, 'error');
    }
  }

  async function guardarVecinos() {
    const pin = document.getElementById('admin-pin').value;
    const btn = document.getElementById('btn-guardar');
    btn.disabled = true;
    btn.textContent = 'Guardando...';
    mostrarStatus('Guardando en la nube...', 'loading');

    const validos = vecinos.filter(v => v.parcela && v.telefono);

    try {
      const res = await fetch(`${API}/api/admin-vecinos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pin': pin },
        body: JSON.stringify({ vecinos: validos })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      mostrarStatus(`✅ ${data.total} vecinos guardados correctamente`, 'ok');
    } catch (err) {
      mostrarStatus(`❌ Error: ${err.message}`, 'error');
    }

    btn.disabled = false;
    btn.textContent = '💾 Guardar cambios';
  }

  function render() {
    const cont = document.getElementById('lista-vecinos');
    cont.innerHTML = '';
    vecinos.forEach((v, i) => {
      const row = document.createElement('div');
      row.className = 'vecino-row';
      row.innerHTML = `
        <input type="number" value="${v.parcela}" placeholder="Nº" onchange="update(${i},'parcela',this.value)" min="1"/>
        <input type="text" value="${v.nombre}" placeholder="Nombre completo" onchange="update(${i},'nombre',this.value)"/>
        <input type="tel" value="${v.telefono}" placeholder="+56900000000" onchange="update(${i},'telefono',this.value)"/>
        <button class="btn-del" onclick="eliminar(${i})">🗑 Quitar</button>
      `;
      cont.appendChild(row);
    });
    document.getElementById('contador').textContent = vecinos.length;
  }

  function update(i, campo, val) { vecinos[i][campo] = val; }

  function agregarVecino() {
    vecinos.push({ parcela: '', nombre: '', telefono: '' });
    render();
  }

  function eliminar(i) {
    if (!confirm(`¿Eliminar a ${vecinos[i].nombre || 'este vecino'}?`)) return;
    vecinos.splice(i, 1);
    render();
  }

  function mostrarStatus(msg, tipo) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `status ${tipo}`;
  }
</script>
</body>
</html>
